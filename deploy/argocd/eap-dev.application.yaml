apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eap-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: eap
  source:
    repoURL: https://git.crisil.internal/eap/eap.git
    targetRevision: main
    path: deploy/kubernetes/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: eap-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

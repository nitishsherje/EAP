apiVersion: apps/v1
kind: Deployment
metadata:
  name: eap
  labels:
    app.kubernetes.io/name: eap
    app.kubernetes.io/component: api-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: eap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eap
        app.kubernetes.io/component: api-runtime
    spec:
      serviceAccountName: eap
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: eap
          image: REGISTRY/eap:latest # overridden per overlay / by CI image tag
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: eap-config
            - secretRef:
                name: eap-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

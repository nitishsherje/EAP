# EXAMPLE ONLY - do not commit real secrets. In production these values are
# injected by the enterprise secrets manager (e.g. External Secrets Operator /
# Vault / AWS Secrets Manager), never stored in git.
#
# Each key follows the SecretsProvider convention: EAP_SECRET_<UPPER_SNAKE_NAME>
# where <name> matches a binding's auth.secret_ref (dashes -> underscores).
apiVersion: v1
kind: Secret
metadata:
  name: eap-secrets
  labels:
    app.kubernetes.io/name: eap
type: Opaque
stringData:
  EAP_SECRET_LLM_GATEWAY_OAUTH: "replace-me"
  EAP_SECRET_DOCLING_OAUTH: "replace-me"
  EAP_SECRET_MILVUS_API_KEY: "replace-me"

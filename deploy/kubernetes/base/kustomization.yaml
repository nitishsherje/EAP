apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/part-of: eap-platform

resources:
  - serviceaccount.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml
  - hpa.yaml
  - networkpolicy.yaml
  # secret.example.yaml is intentionally NOT included; real secrets are provided
  # by the enterprise secrets manager (e.g. External Secrets Operator).

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eap-dev

resources:
  - ../../base

images:
  - name: REGISTRY/eap
    newName: REGISTRY/eap
    newTag: dev

replicas:
  - name: eap
    count: 1

patches:
  - path: config-patch.yaml
    target:
      kind: ConfigMap
      name: eap-config

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, types, architecture, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy

      - name: Import Linter (architecture boundaries)
        run: lint-imports

      - name: Schemas up to date
        run: |
          python scripts/generate_schemas.py
          git diff --exit-code contracts/schemas

      - name: Pytest
        run: pytest -q

  image:
    name: Build container image
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t eap:${{ github.sha }} .
      # Publish + GitOps bump handled by the release pipeline:
      #   - push image to the enterprise registry
      #   - update deploy/kubernetes/overlays/*/kustomization.yaml image tag
      #   - Argo CD syncs the change (dev automatically, prod via gated promotion)

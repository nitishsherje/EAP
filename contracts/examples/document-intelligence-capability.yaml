apiVersion: eap.crisil/v1
kind: Capability
metadata:
  name: document-intelligence
  version: 1.0.0
  description: Document parsing and extraction (backed by CRISIL Docling Gateway).
  domain: platform
  owner: platform-team
spec:
  type: tool
  protocol: api
  operations:
    - name: parse_document
      description: Convert a document to structured content.
      method: POST
      path: /v1/parse
      structured: true
      input_schema:
        type: object
        properties:
          document_id:
            type: string
        required: [document_id]
      output_schema:
        type: object
        properties:
          content:
            type: string
          sections:
            type: array
    - name: extract_tables
      description: Extract tables from a document.
      method: POST
      path: /v1/tables
  required_scopes: [document.read]
  classification: internal
  data_sensitivity: confidential
